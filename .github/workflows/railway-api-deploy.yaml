name: Railway API Deploy

on:
  push:
    branches: [development, main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "railway.json"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # `railway up` uploads cwd and ignores .railwayignore on this CLI
      # version, so prune everything the api container doesn't need before
      # the upload step. Keeps the payload well under Railway's ingress
      # limit (was 441 MB → Cloudflare 413 without this).
      - name: Strip non-api dirs to shrink the Railway upload
        run: |
          rm -rf apps/ios apps/admin apps/docs docs

      - name: Deploy to Railway
        run: |
          npx railway up \
            --service ${{ vars.RAILWAY_API_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
